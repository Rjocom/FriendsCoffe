<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Friends Coffee - Pilih Menu & Pesan via WhatsApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f8f4e9 0%, #f0e9dc 100%);
            color: #2c221b;
            line-height: 1.4;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: rgba(255, 253, 245, 0.85);
            backdrop-filter: blur(1px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            padding: 2rem 2rem 3rem;
        }
        
        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo-icon {
            font-size: 3.2rem;
            color: #b45f2b;
            background: #f3e5d8;
            display: inline-block;
            width: 80px;
            height: 80px;
            line-height: 90px;
            border-radius: 60px;
            box-shadow: 0 10px 15px -6px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
        }
        
        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3e2a21, #8b5a2b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .tagline {
            font-size: 1.1rem;
            font-weight: 500;
            color: #7f5e3c;
            background: #fef7e8;
            display: inline-block;
            padding: 0.4rem 1.6rem;
            border-radius: 60px;
        }
        /* kategori */
        
        .menu-categories {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 2rem 0 2rem;
        }
        
        .cat-btn {
            background: #f3ede5;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.7rem 1.8rem;
            border-radius: 50px;
            color: #4f3822;
            cursor: pointer;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .cat-btn.active {
            background: #a66e38;
            color: white;
            box-shadow: 0 8px 18px rgba(166, 110, 56, 0.3);
        }
        
        .cat-btn:hover:not(.active) {
            background: #e5d8ca;
            transform: translateY(-2px);
        }
        /* menu grid */
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin: 1rem 0 2rem;
        }
        
        .menu-card {
            background: white;
            border-radius: 1.8rem;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(210, 180, 140, 0.3);
        }
        
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -12px rgba(60, 40, 20, 0.2);
        }
        
        .card-img {
            height: 150px;
            background-size: cover;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 0.8rem;
        }
        
        .badge-category {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
            color: #fff3e6;
        }
        
        .card-content {
            padding: 1.2rem;
        }
        
        .menu-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: #2c1c12;
        }
        
        .menu-desc {
            color: #6b4e34;
            font-size: 0.8rem;
            line-height: 1.4;
            margin-bottom: 0.8rem;
        }
        
        .price {
            font-weight: 800;
            font-size: 1.3rem;
            color: #b45a2a;
            margin-bottom: 0.8rem;
        }
        /* quantity selector */
        
        .order-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.5rem;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .qty-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f5efe8;
            border-radius: 40px;
            padding: 0.2rem 0.6rem;
        }
        
        .qty-btn {
            background: #e0cfbe;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            color: #4a2e1e;
            transition: 0.1s;
        }
        
        .qty-btn:hover {
            background: #c9b296;
        }
        
        .qty-value {
            font-weight: 700;
            min-width: 30px;
            text-align: center;
            font-size: 1.1rem;
        }
        
        .btn-pesan-wa {
            background: #25D366;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-pesan-wa:hover {
            background: #1da959;
            transform: scale(0.97);
        }
        /* keranjang / ringkasan pesanan */
        
        .cart-sidebar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c1c12;
            backdrop-filter: blur(12px);
            background: rgba(44, 28, 18, 0.95);
            border-radius: 60px;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            cursor: pointer;
            z-index: 100;
            border: 1px solid rgba(255, 215, 170, 0.5);
            transition: 0.2s;
        }
        
        .cart-sidebar i:first-child {
            font-size: 1.4rem;
            color: #ffcf9a;
        }
        
        .cart-sidebar span {
            background: #d98841;
            border-radius: 40px;
            padding: 2px 12px;
            font-size: 0.85rem;
        }
        
        .cart-sidebar:hover {
            transform: scale(1.02);
            background: #1f150e;
        }
        /* modal ringkasan & detail pesanan */
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #fffaf2;
            max-width: 500px;
            width: 90%;
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.3);
            animation: fadeUp 0.2s ease;
        }
        
        .modal-content h3 {
            font-size: 1.7rem;
            margin-bottom: 1rem;
            color: #3e2a21;
        }
        
        .cart-items-list {
            max-height: 350px;
            overflow-y: auto;
            margin: 1rem 0;
            border-top: 1px solid #e6d5c0;
            border-bottom: 1px solid #e6d5c0;
            padding: 0.8rem 0;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px dashed #eedbc8;
        }
        
        .cart-item-name {
            font-weight: 600;
        }
        
        .cart-item-qty-price {
            color: #b45a2a;
            font-weight: 600;
        }
        
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 1.2rem;
            margin: 1rem 0;
            padding-top: 0.5rem;
        }
        
        .customer-info {
            margin: 1rem 0;
        }
        
        .customer-info input,
        .customer-info textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #e2cfb8;
            border-radius: 1rem;
            font-family: 'Inter', sans-serif;
            background: white;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 1rem;
        }
        
        .modal-buttons button {
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-send {
            background: #25D366;
            color: white;
        }
        
        .btn-close {
            background: #e2cfb8;
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .empty-cart-msg {
            text-align: center;
            padding: 2rem;
            color: #aa8b6e;
        }
        
        .toast-msg {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: #323232e6;
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            z-index: 200;
            backdrop-filter: blur(8px);
            pointer-events: none;
        }
        
        @media (max-width: 680px) {
            body {
                padding: 1rem;
            }
            .container {
                padding: 1.2rem;
            }
            h1 {
                font-size: 2rem;
            }
            .cart-sidebar {
                padding: 0.5rem 1rem;
            }
        }
        
        .remove-item {
            color: #b97f54;
            cursor: pointer;
            margin-left: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hero">
            <div class="logo-icon"><i class="fas fa-mug-hot"></i></div>
            <h1>Friends Coffee</h1>
            <div class="tagline"><i class="fab fa-whatsapp"></i> Pilih Menu & Jumlah • Pesan via WhatsApp</div>
        </div>

        <div class="menu-categories">
            <button class="cat-btn active" data-category="all"><i class="fas fa-utensils"></i> Semua</button>
            <button class="cat-btn" data-category="coffee"><i class="fas fa-mug-hot"></i> Coffee</button>
            <button class="cat-btn" data-category="non-coffee"><i class="fas fa-leaf"></i> Non-Coffee</button>
            <button class="cat-btn" data-category="freppio"><i class="fas fa-blender"></i> Freppio</button>
        </div>

        <div class="menu-grid" id="menuGrid"></div>
        <div class="footer-note" style="text-align: center; font-size:0.8rem; color:#86643f; margin-top:1rem;">
            <span><i class="fab fa-whatsapp"></i> +62 812-3456-7890 (CS)</span>
            <span><i class="fas fa-clock"></i> 08:00 - 22:00</span>
        </div>
    </div>

    <!-- Floating Cart -->
    <div class="cart-sidebar" id="cartSidebar" style="display: none;">
        <i class="fas fa-shopping-bag"></i>
        <span id="cartCount">0</span> item
        <i class="fas fa-chevron-right"></i>
    </div>

    <!-- Modal untuk konfirmasi & pengisian data pemesan -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h3><i class="fab fa-whatsapp"></i> Ringkasan Pesanan</h3>
            <div id="modalCartItems" class="cart-items-list"></div>
            <div id="modalTotal" class="cart-total"></div>
            <div class="customer-info">
                <input type="text" id="customerName" placeholder="Nama Anda *" value="">
                <textarea id="customerNote" rows="2" placeholder="Catatan / metode pesan (Dine in / Take away / Delivery & alamat)"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn-close" id="closeModalBtn">Tutup</button>
                <button class="btn-send" id="confirmOrderBtn"><i class="fab fa-whatsapp"></i> Kirim ke WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi Nomor WhatsApp Bisnis (ganti dengan nomor asli)
        const BUSINESS_PHONE = "6282330855036"; // contoh +62 812-3456-7890

        // Data Menu Lengkap
        const menuData = [{
            id: 1,
            name: "Cookies and Cream",
            desc: "Kopi dengan perpaduan oreo.",
            price: 15000,
            priceStr: "Rp 15.000",

        }, {
            id: 7,
            name: "Tiramisu",
            desc: "Buterscot dengan rasa creamy dari cream.",
            price: 15000,
            priceStr: "Rp 15.000",
            category: "coffee"
        }, {
            id: 8,
            name: "Good Coffe",
            desc: "Rasa kopi yang creamy dan soft.",
            price: 10000,
            priceStr: "Rp 10.000",
            category: "coffee"
        }, {
            id: 9,
            name: "Coffe Avocado",
            desc: "Kopi dengan rasa Alpukat.",
            price: 10000,
            priceStr: "Rp 10.000",
            category: "coffee"
        }, {
            id: 10,
            name: "Taro",
            desc: "",
            price: 15000,
            priceStr: "Rp 15.000",
            category: "non-coffee"
        }, {
            id: 11,
            name: "Red Velvet",
            desc: "",
            price: 15000,
            priceStr: "Rp 15.000",
            category: "non-coffee"
        }, {
            id: 12,
            name: "Cookies and Cream",
            desc: "",
            price: 15000,
            priceStr: "Rp 15.000",
            category: "non-coffee"
        }, {
            id: 13,
            name: "Matcha",
            desc: "",
            price: 15000,
            priceStr: "Rp 15.000",
            category: "non-coffee"
        }, {
            id: 14,
            name: "Ice Coklat",
            desc: "",
            price: 12000,
            priceStr: "Rp 12.000",
            category: "non-coffee"
        }, {
            id: 15,
            name: "Matcha Freppio",
            desc: "Matcha blended with milk & ice.",
            price: 37000,
            priceStr: "Rp 37.000",
            category: "freppio"
        }, {
            id: 16,
            name: "Strawberry Cheesecake Freppio",
            desc: "Rasa strawberry cheesecake creamy.",
            price: 38000,
            priceStr: "Rp 38.000",
            category: "freppio"
        }, {
            id: 17,
            name: "Choco Banana Freppio",
            desc: "Pisang & coklat, dessert segar.",
            price: 37000,
            priceStr: "Rp 37.000",
            category: "freppio"
        }, {
            id: 18,
            name: "Vanilla Bean Freppio",
            desc: "Es campur vanilla bean premium.",
            price: 34000,
            priceStr: "Rp 34.000",
            category: "freppio"
        }];

        // Keranjang: { id, name, price, quantity }
        let cart = [];

        // Simpan ke localStorage
        function saveCart() {
            localStorage.setItem('friends_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function loadCart() {
            const stored = localStorage.getItem('friends_cart');
            if (stored) {
                try {
                    cart = JSON.parse(stored);
                } catch (e) {
                    cart = [];
                }
            } else {
                cart = [];
            }
            updateCartUI();
        }

        function updateCartUI() {
            const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);
            const cartSidebar = document.getElementById('cartSidebar');
            const cartCountSpan = document.getElementById('cartCount');
            if (totalItems > 0) {
                cartSidebar.style.display = 'flex';
                cartCountSpan.innerText = totalItems;
            } else {
                cartSidebar.style.display = 'none';
            }
            // juga re-render menu agar tampilan jumlah tetap sinkron (opsional, tidak perlu re-render semua, tapi tombol quantity tetap up-to-date)
            // kita akan perbarui tampilan jumlah pada setiap card jika sedang terbuka. panggil syncQtyDisplay()
            syncQtyDisplayOnCards();
        }

        // Sinkronisasi display jumlah di setiap card berdasarkan cart
        function syncQtyDisplayOnCards() {
            document.querySelectorAll('.menu-card').forEach(card => {
                const id = parseInt(card.getAttribute('data-id'));
                const qtySpan = card.querySelector('.qty-value');
                if (qtySpan && id) {
                    const cartItem = cart.find(item => item.id === id);
                    const qty = cartItem ? cartItem.quantity : 0;
                    qtySpan.innerText = qty;
                }
            });
        }

        // Tambah / kurangi quantity dari card
        function updateQuantity(menuId, delta) {
            const menu = menuData.find(m => m.id === menuId);
            if (!menu) return;
            const existing = cart.find(item => item.id === menuId);
            if (existing) {
                const newQty = existing.quantity + delta;
                if (newQty <= 0) {
                    // hapus dari keranjang
                    cart = cart.filter(item => item.id !== menuId);
                } else {
                    existing.quantity = newQty;
                }
            } else if (delta > 0) {
                cart.push({
                    id: menu.id,
                    name: menu.name,
                    price: menu.price,
                    quantity: 1
                });
            }
            saveCart();
            showToast(delta > 0 ? `+ ${menu.name}` : `- ${menu.name}`, 1000);
        }

        // Render Menu dengan kontrol jumlah & tombol pesan sekarang (yang nanti akan buka modal)
        function getBackgroundStyle(category) {
            if (category === 'coffee') return `background: linear-gradient(135deg, #e7cfb5, #d9b382);`;
            if (category === 'non-coffee') return `background: linear-gradient(125deg, #ddecd4, #c2ddb0);`;
            return `background: linear-gradient(115deg, #fbe2c1, #f2ca95);`;
        }

        function renderMenu(selectedCategory) {
            const grid = document.getElementById('menuGrid');
            let filtered = selectedCategory === 'all' ? [...menuData] : menuData.filter(m => m.category === selectedCategory);
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-message" style="text-align:center; padding:3rem;">Tidak ada menu</div>`;
                return;
            }
            let html = '';
            filtered.forEach(item => {
                const bgStyle = getBackgroundStyle(item.category);
                const catLabel = {
                    coffee: "☕ Coffee",
                    "non-coffee": "🍃 Non-Coffee",
                    freppio: "🥤 Freppio"
                }[item.category];
                // cari jumlah dari cart
                const cartItem = cart.find(c => c.id === item.id);
                const currentQty = cartItem ? cartItem.quantity : 0;
                html += `
                <div class="menu-card" data-id="${item.id}">
                    <div class="card-img" style="${bgStyle} background-size: cover;">
                        <span class="badge-category"><i class="fas ${item.category === 'coffee' ? 'fa-mug-hot' : (item.category === 'non-coffee' ? 'fa-leaf' : 'fa-blender')}"></i> ${catLabel}</span>
                    </div>
                    <div class="card-content">
                        <div class="menu-title">${escapeHtml(item.name)}</div>
                        <div class="menu-desc">${escapeHtml(item.desc)}</div>
                        <div class="price">${item.priceStr}</div>
                        <div class="order-section">
                            <div class="qty-control">
                                <button class="qty-btn minus-btn" data-id="${item.id}">−</button>
                                <span class="qty-value">${currentQty}</span>
                                <button class="qty-btn plus-btn" data-id="${item.id}">+</button>
                            </div>
                            <button class="btn-pesan-wa order-now-btn" data-id="${item.id}" data-name="${escapeHtml(item.name)}"><i class="fab fa-whatsapp"></i> Pesan</button>
                        </div>
                    </div>
                </div>
            `;
            });
            grid.innerHTML = html;

            // Attach event untuk tombol +/-
            document.querySelectorAll('.minus-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.getAttribute('data-id'));
                    updateQuantity(id, -1);
                });
            });
            document.querySelectorAll('.plus-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.getAttribute('data-id'));
                    updateQuantity(id, 1);
                });
            });
            // Tombol "Pesan" -> membuka modal ringkasan yang berisi semua item yang sudah dipilih (jumlah > 0)
            document.querySelectorAll('.order-now-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // Jika keranjang kosong, maka pesan item ini saja dengan quantity 1 (memudahkan)
                    if (cart.length === 0) {
                        const id = parseInt(btn.getAttribute('data-id'));
                        const name = btn.getAttribute('data-name');
                        // langsung tambahkan dengan quantity 1 jika belum ada
                        const existing = cart.find(i => i.id === id);
                        if (!existing) {
                            const menu = menuData.find(m => m.id === id);
                            if (menu) cart.push({
                                id: menu.id,
                                name: menu.name,
                                price: menu.price,
                                quantity: 1
                            });
                            saveCart();
                        } else if (existing.quantity === 0) {
                            existing.quantity = 1;
                            saveCart();
                        }
                    }
                    // Buka modal pesanan dengan semua item yang ada di cart
                    openOrderModal();
                });
            });
        }

        // Buka modal dan tampilkan daftar pesanan + total
        function openOrderModal() {
            if (cart.length === 0) {
                showToast("Belum memilih menu. Silakan tambahkan pesanan dulu.");
                return;
            }
            const modal = document.getElementById('orderModal');
            const containerItems = document.getElementById('modalCartItems');
            const totalContainer = document.getElementById('modalTotal');
            let itemsHtml = '';
            let total = 0;
            cart.forEach(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                itemsHtml += `
                <div class="cart-item">
                    <span class="cart-item-name">${escapeHtml(item.name)} <span style="font-size:0.8rem;">x${item.quantity}</span></span>
                    <span class="cart-item-qty-price">Rp ${subtotal.toLocaleString('id-ID')}</span>
                </div>
            `;
            });
            containerItems.innerHTML = itemsHtml || '<div class="empty-cart-msg">Keranjang kosong</div>';
            totalContainer.innerHTML = `<span>Total Pesanan</span><span style="color:#b45a2a;">Rp ${total.toLocaleString('id-ID')}</span>`;
            // reset input nama & catatan
            document.getElementById('customerName').value = '';
            document.getElementById('customerNote').value = '';
            modal.style.display = 'flex';
        }

        // Kirim pesanan via WhatsApp
        function sendOrderToWA() {
            if (cart.length === 0) {
                showToast("Keranjang kosong!");
                return;
            }
            const customerName = document.getElementById('customerName').value.trim();
            if (customerName === "") {
                showToast("Mohon isi nama pemesan");
                return;
            }
            const customerNote = document.getElementById('customerNote').value.trim();
            let message = " *PESANAN FRIENDS COFFEE* \n";
            message += "----------------------------------\n";
            let total = 0;
            cart.forEach(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                message += `✔️ ${item.name}  x${item.quantity}  = Rp ${subtotal.toLocaleString('id-ID')}\n`;
            });
            message += "----------------------------------\n";
            message += ` *Total: Rp ${total.toLocaleString('id-ID')}*\n`;
            message += ` *Nama:* ${customerName}\n`;
            if (customerNote) message += ` *Catatan:* ${customerNote}\n`;
            message += "\nTerima kasih! Pesanan akan segera diproses 🙌\n_Friends Coffee_";
            const encoded = encodeURIComponent(message);
            const waUrl = `https://wa.me/${BUSINESS_PHONE}?text=${encoded}`;
            window.open(waUrl, '_blank');
            // Setelah kirim, kosongkan keranjang?
            if (confirm("Pesanan sudah dikirim ke WhatsApp. Kosongkan keranjang sekarang?")) {
                cart = [];
                saveCart();
                closeModal();
                showToast(" Pesanan terkirim & keranjang dikosongkan");
            } else {
                closeModal();
            }
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function showToast(msg, duration = 1800) {
            let toast = document.querySelector('.toast-msg');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast-msg';
                document.body.appendChild(toast);
            }
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.style.display = 'none', 300);
            }, duration);
            toast.style.opacity = '1';
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Inisialisasi filter kategori
        function initFilters() {
            const btns = document.querySelectorAll('.cat-btn');
            let activeCat = 'all';

            function setActive(cat) {
                btns.forEach(btn => {
                    if (btn.getAttribute('data-category') === cat) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
                renderMenu(cat);
            }
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    activeCat = btn.getAttribute('data-category');
                    setActive(activeCat);
                });
            });
            setActive('all');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCart();
            initFilters();
            // Sidebar cart (buka modal)
            document.getElementById('cartSidebar').addEventListener('click', openOrderModal);
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            document.getElementById('confirmOrderBtn').addEventListener('click', sendOrderToWA);
            window.addEventListener('click', (e) => {
                if (e.target === document.getElementById('orderModal')) closeModal();
            });
        });
    </script>
</body>

</html>
